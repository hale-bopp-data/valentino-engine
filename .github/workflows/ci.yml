name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: CLI smoke
        run: |
          node dist/bin/valentino.js guardrails
          echo "color: #ff0000;" > /tmp/test.css
          node dist/bin/valentino.js audit /tmp/test.css && exit 1 || echo "OK"
          node dist/bin/valentino.js contrast "#000" "#fff" AA
